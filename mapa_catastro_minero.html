<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catastro Minero · San Juan</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --panel-2:#1c232c; --line:#283039;
    --ink:#e6edf3; --ink-dim:#8b97a6; --ink-faint:#5b6673;
    --amber:#F3C323; --amber-dim:#b8941c;
    --ok:#4ade80; --warn:#F3C323; --bad:#f87171;
    --sans:"Space Grotesk",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--sans); background:var(--bg); color:var(--ink);
    display:grid; grid-template-rows:auto 1fr; height:100vh; overflow:hidden;
  }

  /* ---------- header ---------- */
  header{
    display:flex; align-items:center; gap:18px; padding:12px 18px;
    background:linear-gradient(180deg,#161b22,#12161c);
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex; align-items:center; gap:11px; min-width:0}
  .lozenge{
    width:30px;height:30px;border-radius:7px;flex:none;
    background:var(--amber); display:grid;place-items:center;
    color:#0e1116;font-weight:700;font-size:15px;
    box-shadow:0 0 0 1px #00000040, 0 4px 14px #f3c32330;
  }
  .brand h1{font-size:15px;font-weight:600;margin:0;letter-spacing:.2px;white-space:nowrap}
  .brand .sub{font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);letter-spacing:1.5px;text-transform:uppercase}
  .spacer{flex:1}
  .ctl{display:flex;gap:8px;align-items:center}
  button.tool, label.tool{
    font-family:var(--mono);font-size:11px;letter-spacing:.5px;
    background:var(--panel-2);color:var(--ink);border:1px solid var(--line);
    padding:8px 12px;border-radius:7px;cursor:pointer;display:inline-flex;gap:7px;align-items:center;
    transition:border-color .15s, background .15s, color .15s;
  }
  button.tool:hover, label.tool:hover{border-color:var(--amber-dim);color:#fff}
  .seg{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .seg button{font-family:var(--mono);font-size:11px;background:transparent;color:var(--ink-dim);
    border:0;padding:8px 12px;cursor:pointer;letter-spacing:.5px}
  .seg button.on{background:var(--amber);color:#0e1116;font-weight:600}

  /* ---------- shell ---------- */
  .shell{display:grid;grid-template-columns:340px 1fr;min-height:0}
  aside{
    background:var(--panel);border-right:1px solid var(--line);
    display:flex;flex-direction:column;min-height:0;
  }
  .pad{padding:14px 16px}
  .search{
    width:100%;font-family:var(--mono);font-size:12.5px;color:var(--ink);
    background:var(--panel-2);border:1px solid var(--line);border-radius:8px;
    padding:10px 12px;outline:none;
  }
  .search:focus{border-color:var(--amber-dim)}
  .search::placeholder{color:var(--ink-faint)}

  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
  .chip{
    font-family:var(--mono);font-size:10.5px;letter-spacing:.4px;
    padding:5px 9px;border-radius:20px;cursor:pointer;user-select:none;
    border:1px solid var(--line);color:var(--ink-dim);text-transform:capitalize;
    display:flex;align-items:center;gap:6px;transition:.15s;
  }
  .chip .dot{width:8px;height:8px;border-radius:50%}
  .chip.off{opacity:.38}
  .chip:hover{border-color:var(--amber-dim)}

  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--line);
    border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .stat{background:var(--panel);padding:12px 14px}
  .stat .n{font-family:var(--mono);font-size:19px;font-weight:600;color:#fff}
  .stat .l{font-size:10px;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}

  .listhdr{font-family:var(--mono);font-size:10px;letter-spacing:1.4px;text-transform:uppercase;
    color:var(--ink-faint);padding:12px 16px 6px}
  .list{flex:1;overflow-y:auto;padding:0 10px 14px}
  .card{
    background:var(--panel-2);border:1px solid var(--line);border-left:3px solid var(--ink-faint);
    border-radius:8px;padding:11px 12px;margin:6px 0;cursor:pointer;transition:.15s;
  }
  .card:hover{border-color:var(--amber-dim);transform:translateX(2px)}
  .card.active{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber-dim) inset}
  .card .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .card .exp{font-family:var(--mono);font-size:12px;color:#fff;font-weight:500}
  .card .min{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.6px}
  .card .tit{font-size:12.5px;color:var(--ink);margin-top:5px;line-height:1.3}
  .card .meta{display:flex;gap:10px;margin-top:7px;font-family:var(--mono);font-size:10.5px;color:var(--ink-dim)}
  .conf{display:inline-flex;align-items:center;gap:5px}
  .conf .d{width:7px;height:7px;border-radius:50%}

  /* ---------- map ---------- */
  .mapwrap{position:relative;min-height:0}
  #map{position:absolute;inset:0;background:#0a0d11}
  .leaflet-container{font-family:var(--mono)}
  .hud{
    position:absolute;left:12px;bottom:12px;z-index:500;pointer-events:none;
    background:#0e1116e6;border:1px solid var(--line);border-radius:9px;
    padding:9px 12px;font-family:var(--mono);font-size:11px;color:var(--ink);
    backdrop-filter:blur(6px); min-width:210px;
  }
  .hud .row{display:flex;justify-content:space-between;gap:18px;line-height:1.7}
  .hud .k{color:var(--ink-faint)}
  .hud .v{color:var(--amber)}
  .hud .hdr{color:var(--ink-dim);font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:4px}

  .legend{
    position:absolute;right:12px;bottom:12px;z-index:500;
    background:#0e1116e6;border:1px solid var(--line);border-radius:9px;padding:10px 12px;
    backdrop-filter:blur(6px);font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);
  }
  .legend .hdr{font-size:9.5px;letter-spacing:1.4px;text-transform:uppercase;color:var(--ink-faint);margin-bottom:7px}
  .legend .item{display:flex;align-items:center;gap:8px;line-height:1.9;text-transform:capitalize}
  .legend .sw{width:11px;height:11px;border-radius:3px}

  /* popup */
  .leaflet-popup-content-wrapper{background:var(--panel);color:var(--ink);border-radius:10px;
    border:1px solid var(--line);box-shadow:0 10px 40px #000a}
  .leaflet-popup-tip{background:var(--panel);border:1px solid var(--line)}
  .leaflet-popup-content{margin:13px 15px;font-family:var(--sans)}
  .pop .exp{font-family:var(--mono);font-size:13px;color:#fff;font-weight:600}
  .pop .pill{display:inline-block;font-family:var(--mono);font-size:9.5px;text-transform:uppercase;
    letter-spacing:.5px;padding:2px 7px;border-radius:11px;margin-left:6px;color:#0e1116;font-weight:600}
  .pop .tit{font-size:13px;margin:8px 0 9px}
  .pop table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px}
  .pop td{padding:3px 0;vertical-align:top}
  .pop td.k{color:var(--ink-faint);padding-right:14px;white-space:nowrap}
  .pop td.v{color:var(--ink);text-align:right}

  .empty{padding:24px 16px;color:var(--ink-faint);font-size:12.5px;line-height:1.6;font-family:var(--mono)}
  .leaflet-control-zoom a{background:var(--panel-2)!important;color:var(--ink)!important;border-color:var(--line)!important}

  @media (max-width:780px){
    .shell{grid-template-columns:1fr;grid-template-rows:auto 1fr}
    aside{max-height:42vh}
    .brand .sub{display:none}
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="lozenge">◆</div>
    <div style="min-width:0">
      <h1>Catastro Minero — San&nbsp;Juan</h1>
      <div class="sub">Pedimentos · Boletín Oficial</div>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="ctl">
    <div class="seg" id="baseSeg">
      <button data-base="sat" class="on">Satélite</button>
      <button data-base="map">Mapa</button>
      <button data-base="topo">Relieve</button>
    </div>
    <label class="tool">⬆ Cargar GeoJSON
      <input id="file" type="file" accept=".geojson,.json,application/geo+json" hidden>
    </label>
  </div>
</header>

<div class="shell">
  <aside>
    <div class="pad">
      <input id="search" class="search" placeholder="buscar titular o expediente…">
      <div class="chips" id="chips"></div>
    </div>
    <div class="stats">
      <div class="stat"><div class="n" id="stCount">0</div><div class="l">Pedimentos</div></div>
      <div class="stat"><div class="n" id="stHa">0</div><div class="l">Hectáreas</div></div>
      <div class="stat"><div class="n" id="stMin">0</div><div class="l">Minerales</div></div>
    </div>
    <div class="listhdr">Listado</div>
    <div class="list" id="list"></div>
  </aside>

  <div class="mapwrap">
    <div id="map"></div>
    <div class="hud" id="hud">
      <div class="hdr">Cursor · POSGAR 2007 Faja 2</div>
      <div class="row"><span class="k">LAT</span><span class="v" id="hLat">—</span></div>
      <div class="row"><span class="k">LON</span><span class="v" id="hLon">—</span></div>
      <div class="row"><span class="k">X·N</span><span class="v" id="hN">—</span></div>
      <div class="row"><span class="k">Y·E</span><span class="v" id="hE">—</span></div>
    </div>
    <div class="legend" id="legend"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
<script>
// ---- Gauss-Krüger / POSGAR 2007 Faja 2 (meridiano central -69°, San Juan) ----
proj4.defs("EPSG:5344","+proj=tmerc +lat_0=-90 +lon_0=-69 +k=1 +x_0=2500000 +y_0=0 +ellps=GRS80 +towgs84=0,0,0,0,0,0,0 +units=m +no_defs");

// ---- colores por mineral ----
const COLORS = {
  oro:"#F3C323", plata:"#C9CDD4", cobre:"#E0843E", litio:"#3FD0C9",
  uranio:"#A3E635", hierro:"#C2603F", plomo:"#8B95A3", zinc:"#7FB3D5",
  molibdeno:"#B49BE0", manganeso:"#D98AAE", _otro:"#9AA5B1"
};
const colorOf = m => COLORS[(m||"").toLowerCase()] || COLORS._otro;
const CONF = {alta:"#4ade80", media:"#F3C323", baja:"#f87171"};

// ---- demo embebida (sale del pipeline) ----
const DEMO = {"type":"FeatureCollection","features":[
 {"type":"Feature","properties":{"expediente":"414-0123-2026","titular":"MINERA ANDINA DEL SOL S.A","mineral":"oro","departamento":"Iglesia","superficie_ha":3500,"confianza":"alta","datum":"posgar2007","fecha_boletin":"2026-06-23","centroide_lat":-30.330106,"centroide_lon":-69.779897},
  "geometry":{"type":"Polygon","coordinates":[[[-69.83150500,-30.28469812],[-69.72757469,-30.28531703],[-69.72824181,-30.37551519],[-69.83226739,-30.37489405],[-69.83150500,-30.28469812]]]}},
 {"type":"Feature","properties":{"expediente":"414-0456-2026","titular":"DEL VALLE EXPLORACIONES SRL","mineral":"cobre","departamento":"Calingasta","superficie_ha":null,"confianza":"alta","datum":"posgar2007","fecha_boletin":"2026-06-23","centroide_lat":-31.820617,"centroide_lon":-68.89438},
  "geometry":{"type":"Point","coordinates":[-68.89437966,-31.82061667]}}
]};

// ---- mapa y capas base ----
const map = L.map("map",{zoomControl:true,attributionControl:false}).setView([-31.0,-69.0],7);
const bases = {
  sat: L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxZoom:19}),
  map: L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{maxZoom:20}),
  topo: L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png",{maxZoom:17})
};
let baseCur = bases.sat.addTo(map);
document.getElementById("baseSeg").addEventListener("click",e=>{
  const b=e.target.dataset.base; if(!b) return;
  [...e.currentTarget.children].forEach(x=>x.classList.toggle("on",x.dataset.base===b));
  map.removeLayer(baseCur); baseCur=bases[b].addTo(map); baseCur.bringToBack();
});

// ---- estado ----
let layer=null, feats=[], hidden=new Set(), idToLayer={};

function popupHTML(p){
  const sup = p.superficie_ha!=null ? Number(p.superficie_ha).toLocaleString("es-AR")+" ha" : "—";
  const c = colorOf(p.mineral);
  return `<div class="pop">
    <div class="exp">${p.expediente||"(sin expte)"}<span class="pill" style="background:${c}">${p.mineral||"s/d"}</span></div>
    <div class="tit">${p.titular||"(titular no detectado)"}</div>
    <table>
      <tr><td class="k">Departamento</td><td class="v">${p.departamento||"—"}</td></tr>
      <tr><td class="k">Superficie</td><td class="v">${sup}</td></tr>
      <tr><td class="k">Centroide</td><td class="v">${(+p.centroide_lat).toFixed(5)}, ${(+p.centroide_lon).toFixed(5)}</td></tr>
      <tr><td class="k">Datum</td><td class="v">${p.datum||"—"}</td></tr>
      <tr><td class="k">Boletín</td><td class="v">${p.fecha_boletin||"—"}</td></tr>
      <tr><td class="k">Confianza</td><td class="v" style="color:${CONF[p.confianza]||'#fff'}">${p.confianza||"—"}</td></tr>
    </table></div>`;
}

function style(f){const c=colorOf(f.properties.mineral);return{color:c,weight:2,fillColor:c,fillOpacity:.22};}
function pointToLayer(f,latlng){const c=colorOf(f.properties.mineral);
  return L.circleMarker(latlng,{radius:8,color:c,weight:2,fillColor:c,fillOpacity:.55});}

function render(){
  if(layer) map.removeLayer(layer); idToLayer={};
  const shown={type:"FeatureCollection",features:feats.filter(f=>!hidden.has((f.properties.mineral||"_otro").toLowerCase()) && f._match)};
  layer=L.geoJSON(shown,{style,pointToLayer,onEachFeature:(f,l)=>{
    l.bindPopup(popupHTML(f.properties),{maxWidth:320});
    idToLayer[f._id]=l;
    l.on("click",()=>setActive(f._id,false));
  }}).addTo(map);
  buildList(); buildStats();
}

function buildStats(){
  const v = feats.filter(f=>f._match && !hidden.has((f.properties.mineral||"_otro").toLowerCase()));
  document.getElementById("stCount").textContent=v.length;
  const ha=v.reduce((s,f)=>s+(+f.properties.superficie_ha||0),0);
  document.getElementById("stHa").textContent=ha?Math.round(ha).toLocaleString("es-AR"):"0";
  document.getElementById("stMin").textContent=new Set(v.map(f=>(f.properties.mineral||"").toLowerCase()).filter(Boolean)).size;
}

function buildList(){
  const el=document.getElementById("list");
  const v=feats.filter(f=>f._match && !hidden.has((f.properties.mineral||"_otro").toLowerCase()));
  if(!v.length){el.innerHTML=`<div class="empty">Sin pedimentos para mostrar.<br>Cargá un GeoJSON del pipeline o limpiá los filtros.</div>`;return;}
  el.innerHTML="";
  v.forEach(f=>{
    const p=f.properties,c=colorOf(p.mineral);
    const d=document.createElement("div");d.className="card";d.style.borderLeftColor=c;d.dataset.id=f._id;
    d.innerHTML=`<div class="top"><span class="exp">${p.expediente||"(sin expte)"}</span>
      <span class="min" style="color:${c}">${p.mineral||"s/d"}</span></div>
      <div class="tit">${p.titular||"(titular no detectado)"}</div>
      <div class="meta"><span>${p.departamento||"—"}</span>
      <span>${p.superficie_ha!=null?Number(p.superficie_ha).toLocaleString("es-AR")+" ha":"—"}</span>
      <span class="conf"><i class="d" style="background:${CONF[p.confianza]||'#777'}"></i>${p.confianza||"?"}</span></div>`;
    d.onclick=()=>setActive(f._id,true);
    el.appendChild(d);
  });
}

function setActive(id,fly){
  document.querySelectorAll(".card").forEach(c=>c.classList.toggle("active",c.dataset.id==id));
  const l=idToLayer[id]; if(!l) return;
  if(fly){ const b=l.getBounds?l.getBounds():null;
    if(b&&b.isValid()) map.flyToBounds(b,{padding:[60,60],maxZoom:12});
    else map.flyTo(l.getLatLng(),12); }
  l.openPopup();
}

function buildChips(){
  const set=[...new Set(feats.map(f=>(f.properties.mineral||"_otro").toLowerCase()))];
  const el=document.getElementById("chips");el.innerHTML="";
  set.forEach(m=>{
    const c=document.createElement("div");c.className="chip";c.dataset.m=m;
    c.innerHTML=`<span class="dot" style="background:${colorOf(m)}"></span>${m==="_otro"?"otro":m}`;
    c.onclick=()=>{c.classList.toggle("off");hidden.has(m)?hidden.delete(m):hidden.add(m);render();};
    el.appendChild(c);
  });
  // leyenda
  const lg=document.getElementById("legend");
  lg.innerHTML=`<div class="hdr">Mineral</div>`+set.map(m=>
    `<div class="item"><span class="sw" style="background:${colorOf(m)}"></span>${m==="_otro"?"otro":m}</div>`).join("");
}

function load(geojson){
  feats=(geojson.features||[]).map((f,i)=>({...f,_id:i,_match:true}));
  hidden=new Set();
  buildChips(); applySearch(); 
  // encuadrar
  const tmp=L.geoJSON(geojson); const b=tmp.getBounds();
  render();
  if(b.isValid()) map.fitBounds(b,{padding:[60,60],maxZoom:11});
}

function applySearch(){
  const q=document.getElementById("search").value.trim().toLowerCase();
  feats.forEach(f=>{const p=f.properties;
    f._match=!q || (`${p.titular||""} ${p.expediente||""} ${p.departamento||""}`.toLowerCase().includes(q));});
  render();
}
document.getElementById("search").addEventListener("input",applySearch);

// ---- carga de archivo ----
document.getElementById("file").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ load(JSON.parse(r.result)); }catch(err){ alert("No pude leer el GeoJSON: "+err.message); } };
  r.readAsText(f);
});

// ---- HUD de coordenadas ----
map.on("mousemove",e=>{
  const {lat,lng}=e.latlng;
  document.getElementById("hLat").textContent=lat.toFixed(5);
  document.getElementById("hLon").textContent=lng.toFixed(5);
  try{
    const [E,N]=proj4("EPSG:4326","EPSG:5344",[lng,lat]);
    document.getElementById("hN").textContent=N.toLocaleString("es-AR",{maximumFractionDigits:0});
    document.getElementById("hE").textContent=E.toLocaleString("es-AR",{maximumFractionDigits:0});
  }catch(_){}
});

load(DEMO);
</script>
</body>
</html>
